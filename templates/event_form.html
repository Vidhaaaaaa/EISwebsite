{% extends "base.html" %}

{% block title %}Event Registration - EIS MUJ{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="page-hero page-hero--image">
    <div class="page-hero__bg"></div>
    <div class="page-hero__overlay"></div>
    <div class="container page-hero__inner">
        <div class="page-hero__content">
            <h1 class="page-hero__title">Event Registration</h1>
            <p class="page-hero__subtitle">Join us for an amazing experience</p>
        </div>
    </div>
</section>

    <!-- Form Section -->
    <section class="section">
        <div class="container">
            <div class="form-container">
                <form id="eventForm" class="event-form">
                    <div class="form__header">
                        <h2 class="form__title">Register for One Day CEO</h2>
                        <p class="form__subtitle">Fill in your details to participate</p>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label for="fullName" class="form__label">Full Name *</label>
                            <input type="text" id="fullName" name="fullName" class="form__input" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label for="whatsappNumber" class="form__label">WhatsApp Number *</label>
                            <input type="tel" id="whatsappNumber" name="whatsappNumber" class="form__input" placeholder="+91 98765 43210" required>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label for="outlookId" class="form__label">Outlook ID *</label>
                            <input type="email" id="outlookId" name="outlookId" class="form__input" placeholder="your.name@jaipur.manipal.edu" required>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label for="course" class="form__label">Course *</label>
                            <input type="text" id="form" name="course" class="form__input" placeholder="BTech CSE" required>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label for="year" class="form__label">Year *</label>
                            <select id="year" name="year" class="form__select" required>
                                <option value="">Select your year</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                                <option value="5th Year">5th Year</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label for="registrationNumber" class="form__label">Registration Number *</label>
                            <input type="text" id="registrationNumber" name="registrationNumber" class="form__input" placeholder="20XXUCSXXXX" required>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <label class="form__label">Participation Type (MAX 4 MEMBERS)*</label>
                            <div class="form__radio-group">
                                <label class="form__radio-label">
                                    <input type="radio" name="participationType" value="Individual" class="form__radio" required>
                                    <span class="form__radio-custom"></span>
                                    <span class="form__radio-text">Individual</span>
                                </label>
                                <label class="form__radio-label">
                                    <input type="radio" name="participationType" value="Team" class="form__radio" required>
                                    <span class="form__radio-custom"></span>
                                    <span class="form__radio-text">Team</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form__row">
                        <div class="form__group">
                            <button type="submit" class="form__button">
                                <span class="form__button-text">Submit Registration</span>
                                <span class="form__button-icon">→</span>
                            </button>
                        </div>
                    </div>

                    <div id="formMessage" class="form__message"></div>
                </form>
            </div>
        </div>
    </section>

<script>
// Form submission
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('eventForm');
    const messageDiv = document.getElementById('formMessage');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Get form data
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        
        // Show loading message
        showMessage('Submitting your registration...', 'loading');
        
        // Send data to Google Apps Script
        fetch('https://script.google.com/macros/s/AKfycbwyFNBqwPTHWjbPApUJ64hbrbBVRbuynQhhVs_1KdAo0mjxyHQR5WmjV4svbxlCbbuL_w/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            showMessage('Registration submitted successfully! We\'ll contact you soon.', 'success');
            form.reset();
        })
        .catch((error) => {
            console.error('Error:', error);
            showMessage('There was an error submitting your registration. Please try again.', 'error');
        });
    });

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `form__message form__message--${type}`;
        
        if (type === 'loading') {
            messageDiv.style.display = 'block';
        } else {
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    }
});
</script>

<style>
/* Form-specific styles */
.form-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px;
}

.form__header {
    text-align: center;
    margin-bottom: 40px;
}

.form__title {
    font-size: 2rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 10px;
}

.form__subtitle {
    font-size: 1.1rem;
    color: rgba(226, 232, 240, 0.8);
}
        .form__row {
            margin-bottom: 24px;
        }

        .form__group {
            position: relative;
        }

        .form__label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(226, 232, 240, 0.9);
            font-size: 0.95rem;
        }

        .form__input,
        .form__select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form__input:focus,
        .form__select:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form__input::placeholder,
        .form__select::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .form__radio-group {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .form__radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: rgba(226, 232, 240, 0.9);
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .form__radio-label:hover {
            color: #ffffff;
        }

        .form__radio {
            position: absolute;
            opacity: 0;
        }

        .form__radio-custom {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        .form__radio:checked + .form__radio-custom {
            border-color: #3b82f6;
            background: #3b82f6;
        }

        .form__radio:checked + .form__radio-custom::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
        }

        .form__button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .form__button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .form__button:active {
            transform: translateY(0);
        }

        .form__button-icon {
            transition: transform 0.3s ease;
        }

        .form__button:hover .form__button-icon {
            transform: translateX(4px);
        }

        .form__message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .form__message--success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .form__message--error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .form__message--loading {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .form-container {
                padding: 20px 16px;
            }

            .form__title {
                font-size: 1.5rem;
            }

            .form__radio-group {
                gap: 16px;
            }
        }
    </style>
{% endblock %}
</body>
</html>
