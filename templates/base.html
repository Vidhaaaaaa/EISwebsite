<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>
      {% block title %}EIS MUJ · Entrepreneur & Innovation Society{% endblock %}
    </title>
    <link rel="icon" href="{{ url_for('static', filename='img/eis-logo1.png') }}">

    <meta
      name="description"
      content="EIS MUJ – Entrepreneur & Innovation Society at Manipal University Jaipur. A student-led community turning ideas into impact through startups, projects and events."
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <a href="{{ url_for('home') }}" class="nav-logo">
        <img
          class="brand-logo"
          src="{{ url_for('static', filename='img/eis-logo1.png') }}"
          alt="EIS MUJ logo"
        />
      </a>
      <nav class="nav">
        <button class="nav__toggle" aria-label="Toggle navigation">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 12H21M3 6H21M3 18H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="nav__links">
          <button class="nav__close" aria-label="Close navigation">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <li><a href="{{ url_for('home') }}">Home</a></li>
          <li><a href="{{ url_for('about') }}">About</a></li>
          <li><a href="{{ url_for('gallery') }}">Gallery</a></li>
          <li><a href="{{ url_for('get_involved') }}">Get Involved</a></li>
        </ul>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container site-footer__row">
        <span class="site-footer__brand">EIS MUJ · Manipal University Jaipur</span>
        <span class="site-footer__meta">© {{ 2026 }}</span>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
